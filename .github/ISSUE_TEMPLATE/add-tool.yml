name: Add a Tool
description: Submit a new AI tool for inclusion in the list
title: "[Add Tool] "
labels: ["new tool"]
body:
  - type: input
    id: name
    attributes:
      label: Tool Name
      placeholder: e.g. Meshy
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Game Design
        - Concept Art
        - 3D Asset Generation
        - Rigging & Skinning
        - Motion & Animation
        - Scene & World Generation
        - Game Generation
        - Trailer & Video
        - Agent Frameworks
        - Foundation Models
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: One-line Description
      description: Factual, objective. No superlatives.
      placeholder: e.g. Text and image to 3D model generation platform.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The link is working and publicly accessible.
          required: true
        - label: This tool is not already in the list.
          required: true
        - label: The description is factual and free of marketing language.
          required: true
